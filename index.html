<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Botón Alert</title>
  <style>
    .seccion {
      padding: 20px;
      background-color: #f2f2f2;
      text-align: center;
      border-radius: 10px;
      width: 300px;
      margin: 50px auto;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="seccion">
    <h2>Haz clic en el botón</h2>
    <button onclick="mostrarAlerta()">Click aquí</button>
  </div>

  <script>
    function mostrarAlerta() {
      alert("¡Hola! Este es un mensaje de alerta 🚀");
    }
  </script>

</body>
</html>
